
services:
#################################################
  kos_inspector:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: kos_inspector
    command: /home/user/kos/cross-build.sh --target sim --mode online --role inspector --board-id inspector --simulator-ip 172.28.0.2 --server-ip 172.28.0.4 --mqtt-ip 172.28.0.5 --mqtt-username inspector --mqtt-password secret
    working_dir: /home/user/kos
    user: user
    depends_on:
      - arducopter_inspector
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.1
#################################################
  arducopter_inspector:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arducopter_inspector
    command: /home/user/ardupilot/sitl/arducopter_inspector_obstacles -S --model + --speedup 1 --slave 0  --serial5=tcp:5765:wait --serial6=tcp:5766:wait --serial7=tcp:5767:wait --defaults copter.parm --sim-address=172.28.0.2 --home=60.0025741,27.8573723,0.00,0 -I0 --sysid 1
    working_dir: /home/user/ardupilot
    user: user
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.2
#################################################
  mavproxy_inspector:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: mavproxy_inspector
    command: mavproxy.py --out 172.28.5.254:14550 --out 172.28.5.254:14551 --master tcp:172.28.0.2:5760 --sitl 172.28.0.2:5501 --logfile /home/user/mav.tlog --daemon
    working_dir: /home/user/mavproxy
    user: user
    depends_on:
      - arducopter_inspector
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.3
#################################################
  kos_deliverer:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: kos_deliverer
    command: /home/user/kos/cross-build.sh --target sim --mode online --role deliverer --board-id deliverer --simulator-ip 172.28.0.12 --server-ip 172.28.0.4 --mqtt-ip 172.28.0.5 --mqtt-username deliverer --mqtt-password secret
    working_dir: /home/user/kos
    user: user
    depends_on:
      - arducopter_deliverer
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.11
#################################################
  arducopter_deliverer:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arducopter_deliverer
    command: /home/user/ardupilot/sitl/arducopter_deliverer_obstacles -S --model + --speedup 1 --slave 0  --serial5=tcp:5765:wait --serial6=tcp:5766:wait --serial7=tcp:5767:wait --defaults copter.parm --sim-address=172.28.0.12 --home=60.0026280,27.8573723,0.00,180 -I0 --sysid 2
    working_dir: /home/user/ardupilot
    user: user
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.12
#################################################
  mavproxy_deliverer:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: mavproxy_deliverer
    command: mavproxy.py --out 172.28.5.254:14550 --out 172.28.5.254:14551 --master tcp:172.28.0.12:5760 --sitl 172.28.0.12:5501 --logfile /home/user/mav.tlog --daemon
    working_dir: /home/user/mavproxy
    user: user
    depends_on:
      - arducopter_deliverer
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.13
#################################################
  orvd:
    image: orvd
    build:
      context: .
      dockerfile: ./orvd.Dockerfile
    container_name: orvd
    working_dir: /home/user/orvd
    restart: always
    environment:
      MQTT_HOST: "172.28.0.5"
      MQTT_USERNAME: ${ORVD_MQTT_USERNAME}
      MQTT_PASSWORD: ${ORVD_MQTT_PASSWORD}
    env_file: default.env
    depends_on:
      - mqtt-server
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.4
    ports:
      - "8080:8080"
#################################################
  mqtt-server:
    image: mqtt-server
    build:
      context: .
      dockerfile: ./mqtt-server.Dockerfile
    container_name: mqtt-server
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.5
    ports:
      - "1883:1883"
      - "8883:8883"
#################################################
networks:
  cyberimmune:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          ip_range: 172.28.5.0/24
          gateway: 172.28.5.254
